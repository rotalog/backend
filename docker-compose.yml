version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: rotalog_postgres
    environment:
      POSTGRES_DB: sistema_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Persiste os dados entre restarts
      - rotalog_pgdata:/var/lib/postgresql/data
      # Script executado automaticamente na 1a inicialização
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  rotalog_pgdata:
    driver: local
